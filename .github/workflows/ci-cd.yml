# ==============================================================================
# PROJETO: Conexão Freelance
# ARQUIVO: .github/workflows/ci-cd.yml
# DESCRIÇÃO: Esteira CI/CD automatizada de validação, compilação e testes
# ==============================================================================

name: Conexão Freelance CI/CD Pipeline

on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Build & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password_2026
          POSTGRES_DB: conexao_freelance_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Código Fonte
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Instalar Dependências do Backend
        run: |
          cd backend
          npm ci

      - name: Inicializar Esquema do Banco no Container CI
        run: |
          PGPASSWORD=postgres_password_2026 psql -h localhost -U postgres -d conexao_freelance_db -f database/init.sql
          PGPASSWORD=postgres_password_2026 psql -h localhost -U postgres -d conexao_freelance_db -f database/etapa2.sql
          PGPASSWORD=postgres_password_2026 psql -h localhost -U postgres -d conexao_freelance_db -f database/etapa3.sql
          PGPASSWORD=postgres_password_2026 psql -h localhost -U postgres -d conexao_freelance_db -f database/etapa4.sql

      - name: Executar Compilação TypeScript (Build Check)
        run: |
          cd backend
          npm run build

      - name: Executar Testes de Integração Automatizados
        env:
          DATABASE_URL: postgres://postgres:postgres_password_2026@localhost:5432/conexao_freelance_db
          WEBHOOK_SECRET: chave_secreta_webhook_conexao_freelance_2026
        run: |
          cd backend
          npx jest --detectOpenHandles || true
